apiVersion: apps/v1
kind: Deployment
metadata:
  name: webscraper
  labels:
    app: webscraper
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: webscraper
  template:
    metadata:
      labels:
        app: webscraper
    spec:
      containers:
      - name: webscraper
        image: wmcdonald/webscraper:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          value: "postgresql://scraper_user:scraper_pass@postgres:5432/scraper_db"
        resources:
          limits:
            cpu: "500m"
            memory: "1Gi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        env:
apiVersion: v1
kind: Service
metadata:
  name: webscraper
spec:
  selector:
    app: webscraper
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
